<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAT – Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --error: #ef4444;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #eff6ff 0%, #f0f9ff 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-mark {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -1px;
    }
    .logo-mark span { color: var(--text); }
    .logo-sub {
      font-size: .82rem;
      color: var(--muted);
      margin-top: .3rem;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.25rem 2rem;
      box-shadow: 0 8px 32px rgba(37, 99, 235, .08);
    }

    .login-card h1 {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: .35rem;
    }
    .login-card .subtitle {
      font-size: .88rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    .form-group {
      margin-bottom: 1.1rem;
    }
    .form-group label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      margin-bottom: .4rem;
      color: var(--text);
    }
    .form-group input {
      width: 100%;
      padding: .72rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .95rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      background: #fff;
    }
    .form-group .error-msg {
      display: none;
      font-size: .78rem;
      color: var(--error);
      margin-top: .35rem;
    }
    .form-group.has-error .error-msg { display: block; }
    .form-group.has-error input { border-color: var(--error); }

    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -.5rem;
      margin-bottom: 1.25rem;
    }
    .forgot-row a {
      font-size: .82rem;
      color: var(--primary);
      text-decoration: none;
    }
    .forgot-row a:hover { text-decoration: underline; }

    .btn-login {
      width: 100%;
      padding: .78rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    .btn-login:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }

    .alert {
      display: none;
      margin-bottom: 1.25rem;
      padding: .8rem 1rem;
      border-radius: 8px;
      font-size: .875rem;
    }
    .alert.error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
    }
    .alert.show { display: block; }

    footer {
      margin-top: 1.75rem;
      text-align: center;
      font-size: .8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div class="login-wrapper">

    <div class="logo">
      <div class="logo-mark">LAT <span>Analyse</span></div>
      <div class="logo-sub">Landingpage Analyse Tool</div>
    </div>

    <div class="login-card">
      <h1>Willkommen zurück</h1>
      <p class="subtitle">Melde dich mit deinen Zugangsdaten an.</p>

      <div class="alert error" id="login-alert">
        E-Mail oder Passwort ist falsch. Bitte erneut versuchen.
      </div>

      <form id="login-form" novalidate>
        <div class="form-group" id="group-email">
          <label for="email">E-Mail-Adresse</label>
          <input type="email" id="email" name="email" placeholder="max@beispiel.de" autocomplete="email" />
          <span class="error-msg">Bitte gib eine gültige E-Mail-Adresse ein.</span>
        </div>

        <div class="form-group" id="group-password">
          <label for="password">Passwort</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" />
          <span class="error-msg">Bitte gib dein Passwort ein.</span>
        </div>

        <div class="forgot-row">
          <a href="#">Passwort vergessen?</a>
        </div>

        <button type="submit" class="btn-login">Anmelden</button>
      </form>
    </div>

    <footer>&copy; 2026 LAT – Landingpage Analyse Tool</footer>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const alertBox = document.getElementById('login-alert');

    function validateField(inputId, groupId) {
      const input = document.getElementById(inputId);
      const group = document.getElementById(groupId);
      let valid = true;

      if (inputId === 'email') {
        valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value.trim());
      } else if (inputId === 'password') {
        valid = input.value.trim().length > 0;
      }

      if (!valid) {
        group.classList.add('has-error');
      } else {
        group.classList.remove('has-error');
      }
      return valid;
    }

    document.getElementById('email').addEventListener('blur', () => validateField('email', 'group-email'));
    document.getElementById('password').addEventListener('blur', () => validateField('password', 'group-password'));

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      alertBox.classList.remove('show');

      const emailOk = validateField('email', 'group-email');
      const passwordOk = validateField('password', 'group-password');

      if (!emailOk || !passwordOk) return;

      // Placeholder: Authentifizierungslogik kommt hier rein
      alertBox.classList.add('show');
    });
  </script>
</body>
</html>
